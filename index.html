<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵弦华夏</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Noto Serif SC', serif;
      color: #e8e4d9;
      min-height: 100vh;
      position: relative;
      background: #0a0a12;
    }

    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--duration) ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: var(--min-opacity); }
      50% { opacity: var(--max-opacity); }
    }

    .site-name {
      position: fixed;
      top: 24px;
      left: 28px;
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.8rem;
      color: #f5e6c8;
      letter-spacing: 0.15em;
      z-index: 100;
      text-shadow: 0 0 20px rgba(245, 230, 200, 0.3);
    }

    .nav {
      position: fixed;
      right: 32px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 28px;
      z-index: 100;
    }

    .nav a {
      font-family: 'Noto Serif SC', serif;
      font-size: 0.95rem;
      color: #c9c4b5;
      text-decoration: none;
      writing-mode: vertical-rl;
      letter-spacing: 0.2em;
      transition: color 0.3s ease;
      padding: 8px 4px;
    }

    .nav a:hover {
      color: #f5e6c8;
    }

    .players {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      z-index: 100;
    }

    .native-player {
      width: 240px;
      height: 30px;
    }

    .native-player audio {
      width: 100%;
      height: 100%;
    }

    .cloudmusic-player {
      width: 240px;
      height: 66px;
    }

    .cloudmusic-player iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .main-content {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 120px 80px;
    }

    .hero {
      text-align: center;
    }

    .hero h1 {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 3.5rem;
      color: #f5e6c8;
      letter-spacing: 0.3em;
      margin-bottom: 20px;
      text-shadow: 0 0 40px rgba(245, 230, 200, 0.2);
    }

    .hero .slogan {
      font-size: 1.1rem;
      color: #a8a49a;
      letter-spacing: 0.4em;
      font-weight: 400;
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 20px;
      font-size: 0.85rem;
      color: #6b6860;
      letter-spacing: 0.1em;
      z-index: 100;
    }

    @media (max-width: 768px) {
      .site-name {
        font-size: 1.4rem;
        top: 16px;
        left: 16px;
      }

      .nav {
        right: 16px;
        top: 50%;
        gap: 20px;
      }

      .nav a {
        font-size: 0.85rem;
      }

      .players {
        top: auto;
        bottom: 80px;
        transform: translateX(-50%);
      }

      .main-content {
        padding: 100px 40px 160px;
      }

      .hero h1 {
        font-size: 2.4rem;
      }

      .hero .slogan {
        font-size: 0.95rem;
        letter-spacing: 0.2em;
      }

      .footer {
        padding: 16px;
        font-size: 0.75rem;
      }
    }

    @media (max-width: 480px) {
      .nav {
        flex-direction: row;
        right: 50%;
        top: auto;
        bottom: 16px;
        transform: translateX(50%);
        gap: 24px;
      }

      .nav a {
        writing-mode: horizontal-tb;
      }

      .players {
        bottom: 70px;
      }

      .native-player, .cloudmusic-player {
        width: 200px;
      }

      .hero h1 {
        font-size: 2rem;
        letter-spacing: 0.2em;
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="site-name">灵弦华夏</div>

  <div class="nav">
    <a href="#works">作品</a>
    <a href="#settings">设定</a>
    <a href="#temp">暂定</a>
  </div>

  <div class="players">
    <div class="native-player">
      <audio controls preload="none">
        <source src="" type="audio/mpeg">
      </audio>
    </div>
    <div class="cloudmusic-player">
      <iframe
        src="https://music.163.com/outchain/player?type=1&id=2092648153&auto=0&height=66"
        frameborder="0"
        scrolling="no">
      </iframe>
    </div>
  </div>

  <main class="main-content">
    <div class="hero">
      <h1>灵弦华夏</h1>
      <p class="slogan">灵弦不灭 · 吾心华夏</p>
    </div>
  </main>

  <footer class="footer">
    贪文笔著 © <span id="date"></span>
  </footer>

  <script>
    (function() {
      const starsContainer = document.getElementById('stars');
      const starCount = 150;

      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
        star.style.setProperty('--min-opacity', Math.random() * 0.3 + 0.1);
        star.style.setProperty('--max-opacity', Math.random() * 0.5 + 0.5);
        star.style.animationDelay = Math.random() * 5 + 's';
        starsContainer.appendChild(star);
      }

      const dateEl = document.getElementById('date');
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      dateEl.textContent = year + '-' + month + '-' + day;
    })();
  </script>
</body>
</html>
