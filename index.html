<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《灵弦华夏》</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --text: #e0e6ff;
            --muted: #8892b0;
            --accent: #00d4ff;
            --accent2: #8a2be2;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(0, 212, 255, 0.2);
            --nav-border: rgba(136, 146, 176, 0.2);
            --btn-bg: rgba(255, 255, 255, 0.08);
            --btn-border: rgba(255, 255, 255, 0.15);
            --star-color: white;
            --stars-bg: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            --title-gradient: linear-gradient(90deg, #00d4ff, #8a2be2, #ff00ff);
        }

        body.light-mode {
            --bg: #f0f4ff;
            --text: #1a1a2e;
            --muted: #5a6070;
            --accent: #1e6fcf;
            --accent2: #7c3aed;
            --card-bg: rgba(0, 0, 0, 0.02);
            --card-border: rgba(30, 111, 207, 0.25);
            --nav-border: rgba(90, 96, 112, 0.2);
            --btn-bg: rgba(0, 0, 0, 0.05);
            --btn-border: rgba(0, 0, 0, 0.12);
            --star-color: #0f172a;
            --stars-bg: radial-gradient(ellipse at bottom, #e2e8ff 0%, #cbd5e1 100%);
            --title-gradient: linear-gradient(90deg, #1e3a8a, #7e22ce, #be185d);
        }

        /* ==================== 【已修复】完整全局样式重置 ==================== */
        /* 清除所有浏览器默认样式，彻底解决后续拓展样式偏差问题 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body, div, span, applet, object, iframe,
        h1, h2, h3, h4, h5, h6, p, blockquote, pre,
        a, abbr, acronym, address, big, cite, code,
        del, dfn, em, img, ins, kbd, q, s, samp,
        small, strike, strong, sub, sup, tt, var,
        b, u, i, center, dl, dt, dd, ol, ul, li,
        fieldset, form, label, legend, table, caption, tbody, tfoot, thead, tr, th, td,
        article, aside, canvas, details, embed,
        figure, figcaption, footer, header, hgroup,
        menu, nav, output, ruby, section, summary,
        time, mark, audio, video {
            margin: 0;
            padding: 0;
            border: 0;
            font-size: 100%;
            font: inherit;
            vertical-align: baseline;
            text-decoration: none;
            list-style: none;
        }
        button, input, select, textarea {
            font-family: inherit;
            font-size: inherit;
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
        }
        /* ====================================================================== */

        body {
            font-family: 'Noto Sans SC', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            transition: background 0.4s, color 0.4s;
            line-height: 1;
        }

        /* 星空背景 */
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: var(--stars-bg); pointer-events: none;
        }
        .star {
            position: absolute; background: var(--star-color); border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* 弦线粒子画布 */
        #strings {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        /* 主容器 */
        .app-shell {
            position: relative; z-index: 1;
            max-width: 900px; margin: 0 auto;
            padding: 4vh 5% 2.5rem;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* 头部 */
        header { text-align: center; margin-bottom: 1.5rem; }
        h1 {
            font-size: 2.8rem; font-weight: 700; letter-spacing: 0.04em;
            background: var(--title-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 12px rgba(0, 212, 255, 0.35)); }
            100% { filter: drop-shadow(0 0 24px rgba(138, 43, 226, 0.5)); }
        }
        .subtitle { color: var(--muted); margin-top: 0.4rem; font-size: 1rem; letter-spacing: 0.04em; }

        /* 工具栏 */
        .toolbar {
            position: absolute; top: 1rem; right: 1rem;
            display: flex; gap: 0.6rem; z-index: 10;
        }
        .tool-btn {
            background: var(--btn-bg); border: 1px solid var(--btn-border);
            border-radius: 50%; width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.1rem; color: var(--muted);
            transition: all 0.3s; backdrop-filter: blur(8px);
        }
        .tool-btn:hover {
            background: rgba(0, 212, 255, 0.12);
            color: var(--accent); border-color: var(--accent);
        }

        /* ==================== 【升级】超级拓展版导航栏 ==================== */
        /* 🔥 拓展说明：全维度预留拓展位，支持 内部页面 / 外部链接 / 互动功能
           分类：1.核心内容页 2.作品拓展页 3.互动功能页 4.外部链接
           使用规则：
           1. 内部页面：href="文件名.html" → 新建对应html文件即可
           2. 外部链接：href="完整网址" ，添加 target="_blank" 新窗口打开
           3. 高亮当前页：给a标签添加 class="active"
           4. 不需要的链接直接删除，无需修改样式
        */
        nav {
            border-top: 1px solid var(--nav-border);
            border-bottom: 1px solid var(--nav-border);
            padding: 0.8rem 0; margin: 1rem 0 1.5rem;
            text-align: center; display: flex; flex-wrap: wrap;
            justify-content: center; gap: 1.2rem;
        }
        nav a {
            color: var(--muted); text-decoration: none; font-size: 1rem;
            transition: all 0.3s; padding: 0.2rem 0; position: relative;
        }
        nav a::after {
            content: ''; position: absolute; bottom: -4px; left: 0;
            width: 0; height: 2px; background: var(--accent);
            transition: width 0.3s; border-radius: 1px;
        }
        nav a:hover, nav a.active { color: var(--accent); }
        nav a:hover::after, nav a.active::after { width: 100%; }
        /* ====================================================================== */

        /* 主内容 */
        main { flex: 1; }
        .content-section h2 {
            font-size: 1.8rem; color: var(--accent);
            margin-bottom: 0.8rem; font-weight: 600;
        }
        .content-section h3 {
            color: #b8c7ff; margin: 1.4rem 0 0.4rem; font-weight: 500;
        }
        body.light-mode .content-section h3 { color: #3a4a6e; }
        .content-section p {
            line-height: 1.8; color: #a8b2d1; margin-bottom: 0.8rem;
        }
        body.light-mode .content-section p { color: #4a5568; }
        .content-section a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
        .content-section a:hover { color: var(--accent2); }
        .card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 10px; padding: 1.3rem; margin-bottom: 1.2rem;
            backdrop-filter: blur(4px); transition: border-color 0.3s;
        }
        .card:hover { border-color: rgba(0, 212, 255, 0.45); }
        .card ul { margin-left: 1.5rem; margin-top: 0.5rem; }
        .card li { margin-bottom: 0.3rem; color: #a8b2d1; }
        body.light-mode .card li { color: #4a5568; }

        /* 页脚 */
        footer {
            text-align: center; color: #4a5568;
            margin-top: 2rem; font-size: 0.85rem; letter-spacing: 0.03em;
        }
        body.light-mode footer { color: #7a8599; }

        /* 响应式 */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            nav { gap: 0.7rem; }
            .toolbar { top: 0.4rem; right: 0.4rem; }
            .tool-btn { width: 34px; height: 34px; font-size: 1rem; }
            .content-section h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <!-- 星空背景层 -->
    <div class="stars" id="stars"></div>
    <!-- 弦线粒子画布层 -->
    <canvas id="strings"></canvas>

    <div class="app-shell">
        <header>
            <h1>《灵弦华夏》</h1>
            <p class="subtitle">作者：贪文笔</p>
        </header>

        <!-- 右上角工具栏（模式切换） -->
        <div class="toolbar">
            <button class="tool-btn" id="mode-toggle" title="切换亮色/暗色模式">🌓</button>
        </div>

        <!-- ==================== 【终极拓展】导航栏（全品类预留位） ==================== -->
        <nav>
            <!-- 🔴 1. 核心页面（必选，网站基础） -->
            <a href="index.html" class="active">首页</a>

            <!-- 🟢 2. 作品内容页（小说核心拓展） -->
            <!-- <a href="chapters.html">章节目录</a> -->
            <!-- <a href="world.html">世界观设定</a> -->
            <!-- <a href="characters.html">人物图鉴</a> -->
            <!-- <a href="extra.html">番外合集</a> -->

            <!-- 🟡 3. 作者/互动页（社区功能拓展） -->
            <!-- <a href="about.html">关于作者</a> -->
            <!-- <a href="comment.html">留言评论</a> -->
            <!-- <a href="update.html">更新日志</a> -->

            <!-- 🟣 4. 外部链接（第三方平台拓展，如GitHub、微博、知乎等） -->
            <!-- <a href="https://github.com/你的ID" target="_blank">GitHub</a> -->
            <!-- <a href="https://weibo.com/" target="_blank">微博</a> -->
            <!-- <a href="https://www.zhihu.com/" target="_blank">知乎</a> -->
        </nav>
        <!-- ====================================================================== -->

        <main>
            <div class="content-section">
                <div class="card" style="text-align: center; padding: 3rem 1rem;">
                    <p>欢迎光临灵弦世界</p>
                    <p style="font-size: 0.9rem; margin-top: 0.5rem;">敬请期待</p>
                </div>
            </div>
        </main>

        <footer>
            &copy; 2026/4/27 贪文笔 · 灵弦华夏
        </footer>
    </div>

    <script>
        // ==================== 【已修复】JS作用域隔离 + DOM容错判断 ====================
        // 自执行函数(IIFE)：彻底隔离全局作用域，杜绝变量名冲突
        (function() {
            'use strict'; // 严格模式，规范代码，减少隐性bug

            // ========== 工具函数：DOM获取容错（不存在则返回null，不报错） ==========
            const getEle = (id) => document.getElementById(id) || null;

            // ========== 全局变量（仅作用于当前函数内，不污染window） ==========
            const starsContainer = getEle('stars');
            const canvas = getEle('strings');
            const modeToggleBtn = getEle('mode-toggle');
            let ctx = null;
            let particles = [];
            const mouse = { x: null, y: null, radius: 120 };

            // ========== 1. 星空生成（容错：元素存在才执行） ==========
            function generateStars() {
                if(!starsContainer) return;
                const fragment = document.createDocumentFragment();
                for (let i = 0; i < 400; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    const size = Math.random() * 2 + 0.5;
                    star.style.width = size + 'px';
                    star.style.height = size + 'px';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.animationDelay = Math.random() * 2 + 's';
                    star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                    fragment.appendChild(star);
                }
                starsContainer.appendChild(fragment);
            }

            // ========== 2. 弦线粒子动画（容错：canvas存在才初始化） ==========
            function resizeCanvas() {
                if(!canvas) return;
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                initParticles();
            }
            function initParticles() {
                if(!canvas) return;
                particles = [];
                const count = Math.min(70, Math.floor((canvas.width * canvas.height) / 15000));
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.45,
                        vy: (Math.random() - 0.5) * 0.45,
                        r: Math.random() * 1.4 + 0.4
                    });
                }
            }
            function animateStrings() {
                if(!canvas || !ctx) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0,212,255,0.45)';
                    ctx.fill();

                    for (let j = i + 1; j < particles.length; j++) {
                        const q = particles[j];
                        const dx = p.x - q.x, dy = p.y - q.y;
                        const d = Math.sqrt(dx * dx + dy * dy);
                        if (d < 100) {
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(q.x, q.y);
                            ctx.strokeStyle = `rgba(138,43,226,${(1 - d / 100) * 0.6})`;
                            ctx.lineWidth = 0.4;
                            ctx.stroke();
                        }
                    }

                    if (mouse.x !== null && mouse.y !== null) {
                        const dx = p.x - mouse.x, dy = p.y - mouse.y;
                        const d = Math.sqrt(dx * dx + dy * dy);
                        if (d < mouse.radius) {
                            const force = (mouse.radius - d) / mouse.radius;
                            p.vx += (dx / d) * force * 0.4;
                            p.vy += (dy / d) * force * 0.4;
                        }
                    }
                }
                requestAnimationFrame(animateStrings);
            }

            // ========== 3. 暗黑/亮色模式（容错：按钮存在才绑定事件） ==========
            function initTheme() {
                if(!modeToggleBtn) return;
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'light') {
                    document.body.classList.add('light-mode');
                    modeToggleBtn.textContent = '☀️';
                }
            }
            function bindThemeEvent() {
                if(!modeToggleBtn) return;
                modeToggleBtn.addEventListener('click', () => {
                    document.body.classList.toggle('light-mode');
                    const isLight = document.body.classList.contains('light-mode');
                    localStorage.setItem('theme', isLight ? 'light' : 'dark');
                    modeToggleBtn.textContent = isLight ? '☀️' : '🌓';
                });
            }

            // ========== 初始化执行 ==========
            window.addEventListener('load', () => {
                generateStars();
                if(canvas) ctx = canvas.getContext('2d');
                resizeCanvas();
                initTheme();
                bindThemeEvent();
                animateStrings();

                // 窗口大小监听
                window.addEventListener('resize', resizeCanvas);
                // 鼠标/触屏监听
                window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
                window.addEventListener('touchmove', e => {
                    if (e.touches.length) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }
                }, { passive: true });
                window.addEventListener('touchend', () => { mouse.x = null; mouse.y = null; });
            });
        })();
    </script>
</body>
</html>
