<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>《灵弦华夏》</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      background: #0a0a1a;
      color: #e0e6ff;
      overflow-x: hidden;
      min-height: 100vh;
      transition: background 0.4s, color 0.4s;
    }
    /* 亮色模式变量 */
    body.light-mode {
      background: #f0f4ff;
      color: #1a1a2e;
    }
    body.light-mode .stars {
      background: radial-gradient(ellipse at bottom, #e2e8ff 0%, #cbd5e1 100%);
    }
    body.light-mode .star {
      background: #0f172a;
    }
    body.light-mode .app-shell header h1 {
      background: linear-gradient(90deg, #1e3a8a, #7e22ce, #be185d);
      -webkit-background-clip: text;
      background-clip: text;
    }

    /* 星空背景 */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.3; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    /* 弦线画布 */
    #strings {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none; /* 让点击穿透到导航 */
    }

    /* 应用外壳 */
    .app-shell {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 5vh 5% 3rem;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* 头部 */
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(90deg, #00d4ff, #8a2be2, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 20px rgba(0,212,255,0.5);
      animation: titleGlow 3s ease-in-out infinite alternate;
    }
    @keyframes titleGlow {
      0% { text-shadow: 0 0 15px rgba(0,212,255,0.4); }
      100% { text-shadow: 0 0 30px rgba(138,43,226,0.6); }
    }
    .subtitle {
      color: #8892b0;
      margin-top: 0.5rem;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
    }

    /* 工具栏（模式切换、搜索） */
    .toolbar {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.8rem;
      z-index: 10;
    }
    .tool-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      color: #8892b0;
      transition: all 0.3s;
      backdrop-filter: blur(8px);
    }
    .tool-btn:hover {
      background: rgba(0,212,255,0.15);
      color: #00d4ff;
      border-color: #00d4ff;
    }

    /* 搜索弹窗 */
    .search-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding-top: 15vh;
    }
    .search-overlay.open { display: flex; }
    .search-box {
      background: rgba(10,10,26,0.95);
      border: 1px solid rgba(0,212,255,0.3);
      border-radius: 20px;
      width: 90%;
      max-width: 600px;
      padding: 1.2rem;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }
    .search-input {
      width: 100%;
      padding: 0.8rem 1rem;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: #e0e6ff;
      font-size: 1.1rem;
      outline: none;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .search-input:focus {
      border-color: #00d4ff;
    }
    .search-results {
      max-height: 60vh;
      overflow-y: auto;
      margin-top: 1rem;
    }
    .search-item {
      padding: 0.6rem 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.2s;
    }
    .search-item:hover { background: rgba(0,212,255,0.1); }
    .search-item .item-title {
      font-weight: 600;
      color: #00d4ff;
    }
    .search-item .item-snippet {
      font-size: 0.9rem;
      color: #8892b0;
    }
    .search-close {
      float: right;
      background: none;
      border: none;
      color: #8892b0;
      font-size: 1.5rem;
      cursor: pointer;
    }

    /* 导航栏 */
    nav {
      border-top: 1px solid rgba(136,146,176,0.2);
      border-bottom: 1px solid rgba(136,146,176,0.2);
      padding: 1rem 0;
      margin: 1.5rem 0;
      text-align: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem;
    }
    nav a {
      color: #8892b0;
      text-decoration: none;
      font-size: 1rem;
      transition: all 0.3s;
      position: relative;
      cursor: pointer;
      padding: 0.2rem 0;
    }
    nav a::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 2px;
      background: #00d4ff;
      transition: width 0.3s;
    }
    nav a:hover, nav a.active {
      color: #00d4ff;
    }
    nav a:hover::after, nav a.active::after {
      width: 100%;
    }

    /* 主内容区 */
    main {
      flex: 1;
    }

    /* 内容通用样式 */
    .content-section h2 {
      font-size: 2rem;
      color: #00d4ff;
      margin-bottom: 1rem;
    }
    .content-section h3 {
      color: #b8c7ff;
      margin: 1.5rem 0 0.5rem;
    }
    .content-section p {
      line-height: 1.8;
      color: #a8b2d1;
      margin-bottom: 1rem;
    }
    .content-section a {
      color: #00d4ff;
      text-decoration: none;
      transition: color 0.2s;
    }
    .content-section a:hover {
      color: #ff00ff;
    }
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(4px);
      transition: border-color 0.3s;
    }
    .card:hover {
      border-color: rgba(0,212,255,0.5);
    }

    /* 阅读进度条 */
    .reading-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: linear-gradient(90deg, #00d4ff, #8a2be2);
      z-index: 200;
      transition: width 0.1s linear;
    }

    /* 页脚 */
    footer {
      text-align: center;
      color: #4a5568;
      margin-top: 2rem;
      font-size: 0.9rem;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      h1 { font-size: 2.2rem; }
      nav a { font-size: 0.9rem; }
      .toolbar { top: 0.5rem; right: 0.5rem; gap: 0.4rem; }
      .tool-btn { width: 36px; height: 36px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <!-- 阅读进度条 -->
  <div class="reading-progress" id="progress-bar"></div>

  <!-- 星空背景 -->
  <div class="stars" id="stars"></div>

  <!-- 弦线画布 -->
  <canvas id="strings"></canvas>

  <!-- 搜索弹窗 -->
  <div class="search-overlay" id="search-overlay">
    <div class="search-box">
      <button class="search-close" id="search-close">&times;</button>
      <input type="text" class="search-input" id="search-input" placeholder="搜索章节、人物、术语...">
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <!-- 应用外壳 -->
  <div class="app-shell">
    <header>
      <h1>《灵弦华夏》</h1>
      <p class="subtitle"> 作者：贪文笔</p>
    </header>

    <!-- 工具栏 -->
    <div class="toolbar">
      <button class="tool-btn" id="mode-toggle" title="切换亮色/暗色模式">🌓</button>
      <button class="tool-btn" id="search-toggle" title="搜索">🔍</button>
    </div>

    <!-- 导航 -->
    <nav id="main-nav">
      <a href="#/home" data-route="/home">首页</a>
      <a href="#/chapters" data-route="/chapters">章节</a>
      <a href="#/characters" data-route="/characters">人物</a>
      <a href="#/world" data-route="/world">世界观</a>
      <a href="#/systems" data-route="/systems">设定体系</a>
      <a href="#/about" data-route="/about">关于</a>
    </nav>

    <!-- 动态内容区 -->
    <main id="view">
      <!-- 由 JS 加载内容片段 -->
    </main>

    <footer>
      &copy; 2026/4/26 贪文笔 · 灵弦华夏
    </footer>
  </div>

  <script>
    // ===================== 全局配置 =====================
    const DEFAULT_ROUTE = '/home';

    // 路由映射表 —— 可随时扩展
    const routes = {
      '/home': 'content/home.html',
      '/chapters': 'content/chapters.html',           // 或改用动态渲染，见 router 逻辑
      '/characters': 'content/characters/index.html',
      '/world': 'content/world/index.html',
      '/systems': 'content/world/soulstring.html',
      '/about': 'content/about.html'
    };

    // 搜索索引文件路径（后续生成）
    const SEARCH_INDEX_URL = 'content/search-index.json';

    // 总章数（用于自动导航，每新增一卷更新这里，或动态从 chapters-index.json 读取）
    let TOTAL_CHAPTERS = 0; // 动态获取，见初始化

    // ===================== 星空生成 =====================
    (function generateStars() {
      const starsContainer = document.getElementById('stars');
      for (let i = 0; i < 500; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.width = Math.random() * 2 + 'px';
        star.style.height = star.style.width;
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 2 + 's';
        starsContainer.appendChild(star);
      }
    })();

    // ===================== 弦线粒子动画 =====================
    (function stringAnimation() {
      const canvas = document.getElementById('strings');
      const ctx = canvas.getContext('2d');
      let particles = [];
      const mouse = { x: null, y: null, radius: 120 };

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initParticles();
      }
      function initParticles() {
        particles = [];
        const count = Math.min(80, Math.floor(canvas.width / 15));
        for (let i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5,
            r: Math.random() * 1.5 + 0.5
          });
        }
      }

      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      window.addEventListener('mousemove', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });
      window.addEventListener('touchmove', e => {
        if (e.touches.length) {
          mouse.x = e.touches[0].clientX;
          mouse.y = e.touches[0].clientY;
        }
      }, { passive: true });
      window.addEventListener('touchend', () => {
        mouse.x = null;
        mouse.y = null;
      });

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let p of particles) {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
          if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0,212,255,0.5)';
          ctx.fill();

          // 连线
          for (let q of particles) {
            const dx = p.x - q.x;
            const dy = p.y - q.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 100) {
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(q.x, q.y);
              ctx.strokeStyle = `rgba(138,43,226,${1 - d / 100})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }

          // 鼠标交互（排斥）
          if (mouse.x && mouse.y) {
            const dx = p.x - mouse.x;
            const dy = p.y - mouse.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < mouse.radius) {
              const force = (mouse.radius - d) / mouse.radius;
              p.vx += (dx / d) * force * 0.5;
              p.vy += (dy / d) * force * 0.5;
            }
          }
        }
        requestAnimationFrame(animate);
      }
      animate();
    })();

    // ===================== 暗色/亮色模式 =====================
    (function themeToggle() {
      const btn = document.getElementById('mode-toggle');
      const body = document.body;
      // 读取本地存储或系统偏好
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        body.classList.add('light-mode');
      }
      btn.addEventListener('click', () => {
        body.classList.toggle('light-mode');
        const isLight = body.classList.contains('light-mode');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        // 更新按钮图标
        btn.textContent = isLight ? '☀️' : '🌓';
      });
      // 初始图标
      if (body.classList.contains('light-mode')) {
        btn.textContent = '☀️';
      }
    })();

    // ===================== 搜索功能 =====================
    (function searchModule() {
      const overlay = document.getElementById('search-overlay');
      const toggleBtn = document.getElementById('search-toggle');
      const closeBtn = document.getElementById('search-close');
      const input = document.getElementById('search-input');
      const resultsDiv = document.getElementById('search-results');
      let searchData = [];

      // 加载搜索索引
      async function loadSearchIndex() {
        try {
          const resp = await fetch(SEARCH_INDEX_URL);
          if (resp.ok) {
            searchData = await resp.json();
          }
        } catch (e) {
          // 索引文件不存在时静默
        }
      }
      loadSearchIndex();

      toggleBtn.addEventListener('click', () => {
        overlay.classList.add('open');
        input.focus();
      });
      closeBtn.addEventListener('click', () => {
        overlay.classList.remove('open');
        input.value = '';
        resultsDiv.innerHTML = '';
      });
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) {
          overlay.classList.remove('open');
          input.value = '';
          resultsDiv.innerHTML = '';
        }
      });

      input.addEventListener('input', () => {
        const query = input.value.trim().toLowerCase();
        if (!query || searchData.length === 0) {
          resultsDiv.innerHTML = '';
          return;
        }
        const filtered = searchData.filter(item =>
          item.title.toLowerCase().includes(query) ||
          (item.keywords && item.keywords.some(k => k.toLowerCase().includes(query))) ||
          (item.snippet && item.snippet.toLowerCase().includes(query))
        ).slice(0, 20); // 最多显示20条

        if (filtered.length === 0) {
          resultsDiv.innerHTML = '<p style="color:#8892b0; padding:1rem;">没有找到相关内容</p>';
          return;
        }
        resultsDiv.innerHTML = filtered.map(item => `
          <div class="search-item" data-route="${item.route}">
            <div class="item-title">${item.type ? '[' + item.type + '] ' : ''}${item.title}</div>
            <div class="item-snippet">${item.snippet || ''}</div>
          </div>
        `).join('');

        // 点击条目跳转
        document.querySelectorAll('.search-item').forEach(el => {
          el.addEventListener('click', () => {
            const route = el.dataset.route;
            if (route) {
              window.location.hash = route;
              overlay.classList.remove('open');
              input.value = '';
              resultsDiv.innerHTML = '';
            }
          });
        });
      });
    })();

    // ===================== SPA 路由与内容加载 =====================
    (function router() {
      const view = document.getElementById('view');
      const navLinks = document.querySelectorAll('#main-nav a');
      const progressBar = document.getElementById('progress-bar');

      // 获取总章数（从 chapters-index.json）
      async function fetchTotalChapters() {
        try {
          const resp = await fetch('content/chapters-index.json');
          if (resp.ok) {
            const data = await resp.json();
            TOTAL_CHAPTERS = data.length;
          }
        } catch (e) {}
      }
      fetchTotalChapters();

      // 生成章节导航 HTML
      function generateChapterNav(currentNum) {
        const prev = currentNum - 1;
        const next = currentNum + 1;
        let html = '<div style="display:flex; justify-content:space-between; margin-top:2rem; padding-top:1rem; border-top:1px solid rgba(136,146,176,0.2);">';
        if (prev > 0) {
          html += `<a href="#/chapter/${String(prev).padStart(3,'0')}" style="color:#00d4ff;">← 上一章</a>`;
        } else {
          html += '<span></span>';
        }
        html += '<a href="#/chapters" style="color:#00d4ff;">📖 目录</a>';
        if (next <= TOTAL_CHAPTERS) {
          html += `<a href="#/chapter/${String(next).padStart(3,'0')}" style="color:#00d4ff;">下一章 →</a>`;
        } else {
          html += '<span></span>';
        }
        html += '</div>';
        return html;
      }

      // 加载页面内容
      async function loadPage(route) {
        let file = routes[route];

        // 动态路由匹配
        if (!file) {
          if (route.startsWith('/chapter/')) {
            const slug = route.split('/chapter/')[1];
            file = `content/chapters/chapter-${slug}.html`;
          } else if (route.startsWith('/character/')) {
            const slug = route.split('/character/')[1];
            file = `content/characters/${slug}.html`;
          } else if (route.startsWith('/world/')) {
            const slug = route.replace('/world/', '');
            file = `content/world/${slug}.html`;
          }
        }

        // 回退到首页
        if (!file) {
          file = routes[DEFAULT_ROUTE];
          route = DEFAULT_ROUTE;
        }

        try {
          const resp = await fetch(file);
          if (!resp.ok) throw new Error('Not found');
          const html = await resp.text();
          view.innerHTML = html;

          // 如果是章节页，自动插入底部导航
          const chapterMatch = route.match(/^\/chapter\/(\d+)$/);
          if (chapterMatch) {
            const num = parseInt(chapterMatch[1], 10);
            const navHTML = generateChapterNav(num);
            view.insertAdjacentHTML('beforeend', navHTML);

            // 记忆最后阅读章节
            localStorage.setItem('last-chapter', route);
            // 恢复滚动位置
            const savedScroll = localStorage.getItem(`scroll-${route}`);
            if (savedScroll) {
              window.scrollTo(0, parseInt(savedScroll, 10));
            } else {
              window.scrollTo(0, 0);
            }
          } else {
            window.scrollTo(0, 0);
          }

          // 执行内容中的内联脚本（如果有）
          const scripts = view.querySelectorAll('script');
          scripts.forEach(s => {
            const newScript = document.createElement('script');
            newScript.textContent = s.textContent;
            document.body.appendChild(newScript).remove();
          });

          // 更新进度条
          progressBar.style.width = '0%';
        } catch (err) {
          view.innerHTML = `
            <div class="content-section">
              <h2>页面未找到</h2>
              <p>这个页面可能尚未创建，或者地址有误。</p>
              <a href="#/home">返回首页</a>
            </div>`;
        }

        // 更新导航激活状态
        navLinks.forEach(a => {
          const href = a.getAttribute('data-route');
          a.classList.toggle('active', href === route);
        });
      }

      // 监听 hash 变化
      function onHashChange() {
        let hash = window.location.hash.slice(1);
        if (!hash) hash = DEFAULT_ROUTE;
        loadPage(hash);
      }

      window.addEventListener('hashchange', onHashChange);

      // 阻止导航默认行为
      navLinks.forEach(a => {
        a.addEventListener('click', (e) => {
          e.preventDefault();
          const route = a.getAttribute('data-route');
          window.location.hash = route;
        });
      });

      // 监听滚动以更新进度条和保存位置
      window.addEventListener('scroll', () => {
        const scrollTop = window.scrollY;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        if (docHeight > 0) {
          const progress = (scrollTop / docHeight) * 100;
          progressBar.style.width = progress + '%';
        }
        // 保存当前页滚动位置
        const currentRoute = window.location.hash.slice(1) || DEFAULT_ROUTE;
        localStorage.setItem(`scroll-${currentRoute}`, scrollTop);
      });

      // 初始加载
      onHashChange();
    })();
  </script>
</body>
</html>
