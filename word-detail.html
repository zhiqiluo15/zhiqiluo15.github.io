<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵弦词集 — 灵弦华夏</title>
    <meta name="description" content="灵弦词集 — 单词详情">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://vacfnpexbwjqscrltwds.supabase.co">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/word-template.css">
</head>
<body>

    <div class="stars" id="stars"></div>

    <nav class="nav">
        <a href="index.html">灵弦华夏</a>
        <a href="works.html">作品</a>
        <a href="settings.html">设定</a>
        <a href="role.html">人物</a>
        <a href="word-software.html" class="active">单词</a>
        <a href="music.html">音乐</a>
        <a href="game.html">游戏</a>
    </nav>

    <main class="template-main template-detail" id="detailRoot">
        <p class="loading">加载中…</p>
    </main>

    <footer class="footer">
        <p>贪文笔著 &copy; <span id="date"></span></p>
    </footer>

    <script src="js/theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase.js"></script>
    <script>
    (async function() {
        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get('id'));
        if (!id) {
            document.getElementById('detailRoot').innerHTML = '<p class="loading">参数错误</p>';
            return;
        }

        const entry = await fetchEntryDetail(id);
        if (!entry) {
            document.getElementById('detailRoot').innerHTML = '<p class="loading">未找到内容</p>';
            return;
        }

        const catSlug = entry.categories?.slug || '';
        const catName = entry.categories?.name_zh || '';
        document.title = (entry.title_zh || '') + ' — ' + catName + ' · 灵弦词集';

        const cd = entry.content_data || {};
        const contextLabel = cd.context_label || '';
        const cards = entry.word_cards || [];

        let contextHtml = '';
        let englishHtml = '';

        // 根据分类渲染不同内容区
        if (cd.poem_lines) {
            // 诗词类
            contextHtml = `
            <section class="detail-context">
                ${cd.poem_lines.map(l => `<p${l.highlight ? ' class="highlight"' : ''}>${l.html.replace(/<ruby>([^<]*)<rt>[^<]*<\/rt><\/ruby>/g, '$1')}</p>`).join('')}
            </section>`;

            englishHtml = `
            <section class="detail-english">
                <h2 class="section-label">${contextLabel}</h2>
                <div class="english-text">
                    ${(cd.translation_lines || []).map(l => `<p${l.highlight ? ' class="en-highlight"' : ''}>${l.text}</p>`).join('')}
                </div>
                ${cd.translator ? `<p class="source-note">译 / ${cd.translator}</p>` : ''}
            </section>`;
        } else if (cd.history_zh) {
            // 历史类
            contextHtml = `
            <section class="detail-context">
                ${cd.history_zh.map(l => `<p${l.highlight ? ' class="highlight"' : ''}>${l.text}</p>`).join('')}
            </section>`;

            englishHtml = `
            <section class="detail-english">
                <h2 class="section-label">${contextLabel}</h2>
                <div class="english-text">
                    ${(cd.history_en || []).map(l => `<p>${l.text}</p>`).join('')}
                </div>
                ${cd.source_note ? `<p class="source-note">${cd.source_note}</p>` : ''}
            </section>`;
        } else if (cd.story_zh) {
            // 词源类
            contextHtml = `
            <section class="detail-context">
                ${cd.story_zh.map(l => `<p${l.highlight ? ' class="highlight"' : ''}>${l.text}</p>`).join('')}
            </section>`;

            englishHtml = `
            <section class="detail-english">
                <h2 class="section-label">${contextLabel}</h2>
                <div class="english-text">
                    ${(cd.etymology_en || []).map(l => `<p>${l.text}</p>`).join('')}
                </div>
            </section>`;
        }

        const cardsHtml = cards.length > 0 ? `
            <section class="word-breakdown">
                <h2 class="section-label">拆 <span class="section-label-sub">Word Breakdown</span></h2>
                <div class="word-cards">
                    ${cards.map(c => `
                        <div class="word-card">
                            <span class="wc-char">${c.word_zh}</span>
                            <span class="wc-word">${c.word_en}</span>
                            <span class="wc-phonetic">${c.phonetic}</span>
                            <p class="wc-def">${c.definition}</p>
                            <p class="wc-context">${c.context_ref}</p>
                        </div>
                    `).join('')}
                </div>
            </section>
        ` : '';

        document.getElementById('detailRoot').innerHTML = `
            <a href="word-list.html?category=${catSlug}" class="back-link">← ${catName}</a>

            <section class="detail-header">
                <h1 class="detail-title">${entry.title_zh}${entry.subtitle_zh ? '<span class="detail-subtitle">' + entry.subtitle_zh + '</span>' : ''}</h1>
                ${entry.title_en ? `<p class="detail-title-en">${entry.title_en}</p>` : ''}
                <p class="detail-meta">${entry.period_label || entry.author_era}</p>
            </section>

            ${contextHtml}
            ${englishHtml}
            ${cardsHtml}

            <a href="word-list.html?category=${catSlug}" class="back-link back-link-bottom">← ${catName}</a>
        `;
    })();
    </script>
</body>
</html>
