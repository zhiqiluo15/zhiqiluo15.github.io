<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵弦词集 — 灵弦华夏</title>
    <meta name="description" content="灵弦词集 — 以诗入词 · 以史鉴词 · 以词溯源">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://vacfnpexbwjqscrltwds.supabase.co">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/word-software.css">
</head>
<body>

    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>

    <!-- 导航 -->
    <nav class="nav">
        <a href="index.html">灵弦华夏</a>
        <a href="works.html">作品</a>
        <a href="settings.html">设定</a>
        <a href="role.html">人物</a>
        <a href="word-software.html" class="active">单词</a>
        <a href="music.html">音乐</a>
        <a href="game.html">游戏</a>
    </nav>

    <!-- 主内容区 -->
    <main class="word-main">

        <!-- 顶部：当日诗词 -->
        <section class="daily-poem">
            <p class="poem-loading">·  ·  ·</p>
            <p class="poem-cn">落霞与孤鹜齐飞，秋水共长天一色</p>
            <p class="poem-source">—— 王勃《滕王阁序》</p>
            <p class="poem-en">A solitary wild duck soars with the sunset clouds —<br>Autumn river merges with the sky in one hue.</p>
        </section>

        <!-- 中部：三入口 -->
        <section class="word-gates" id="wordGates">
            <a class="gate" href="word-list.html?category=poem">
                <h2 class="gate-title">以诗入词</h2>
                <p class="gate-sub">从诗词文言中拆解英文词汇</p>
                <span class="gate-arrow">→</span>
            </a>
            <a class="gate" href="word-list.html?category=history">
                <h2 class="gate-title">以史鉴词</h2>
                <p class="gate-sub">中西历史对照中的语言演变</p>
                <span class="gate-arrow">→</span>
            </a>
            <a class="gate" href="word-list.html?category=etymology">
                <h2 class="gate-title">以词溯源</h2>
                <p class="gate-sub">单词在中文语境中的回声</p>
                <span class="gate-arrow">→</span>
            </a>
        </section>

        <!-- 底部：隐含时间轴 -->
        <section class="timeline-hint">
            <div class="timeline-line">
                <span class="tl-mark" data-era="先秦·希腊">·</span>
                <span class="tl-mark" data-era="盛唐·罗马">·</span>
                <span class="tl-mark" data-era="宋明·文艺复兴">·</span>
                <span class="tl-mark" data-era="晚清·工业革命">·</span>
            </div>
        </section>

    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>贪文笔著 © <span id="date"></span></p>
    </footer>

    <script src="js/theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase.js"></script>
    <script>
    // 从 Supabase 加载当日诗词 & 分类；初始隐藏，就绪后淡入；失败则显示硬编码兜底
    (async function() {
        const section = document.querySelector('.daily-poem');
        const loadingEl = document.querySelector('.poem-loading');

        const [poem, categories] = await Promise.all([
            fetchRandomPoem(),
            fetchCategories()
        ]);

        if (poem) {
            document.querySelector('.daily-poem .poem-cn').innerHTML = poem.poem_html;
            document.querySelector('.daily-poem .poem-source').textContent = '—— ' + poem.source;
            document.querySelector('.daily-poem .poem-en').innerHTML =
                poem.poem_en + (poem.poem_en2 ? '<br>' + poem.poem_en2 : '');
        }

        // 动态替换三入口卡片
        if (categories && categories.length > 0) {
            document.getElementById('wordGates').innerHTML = categories.map(c => `
                <a class="gate" href="word-list.html?category=${c.slug}">
                    <h2 class="gate-title">${c.name_zh}</h2>
                    <p class="gate-sub">${c.desc_zh || ''}</p>
                    <span class="gate-arrow">→</span>
                </a>
            `).join('');
        }

        if (loadingEl) loadingEl.remove();
        section.style.opacity = '1';
    })();
    </script>
</body>
</html>
