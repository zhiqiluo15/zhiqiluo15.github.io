    <!-- 主内容区 -->
    <main class="word-main">

        <!-- 顶部：当日诗词 -->
        <section class="daily-poem">
            <p class="poem-cn">
                <ruby>落<rt>luò</rt></ruby><ruby>霞<rt>xiá</rt></ruby><ruby>与<rt>yǔ</rt></ruby><ruby>孤<rt>gū</rt></ruby><ruby>鹜<rt>wù</rt></ruby><ruby>齐<rt>qí</rt></ruby><ruby>飞<rt>fēi</rt></ruby>，<ruby>秋<rt>qiū</rt></ruby><ruby>水<rt>shuǐ</rt></ruby><ruby>共<rt>gòng</rt></ruby><ruby>长<rt>cháng</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>一<rt>yī</rt></ruby><ruby>色<rt>sè</rt></ruby>
            </p>
            <p class="poem-source">—— 王勃《滕王阁序》</p>
            <p class="poem-en">A solitary wild duck soars with the sunset clouds —<br>Autumn river merges with the sky in one hue.</p>
        </section>

        <!-- 中部：三入口 -->
        <section class="word-gates">
            <div class="gate" onclick="location.href='word-poem-list.html'">
                <h2 class="gate-title">以诗入词</h2>
                <p class="gate-sub">从诗词文言中拆解英文词汇</p>
                <span class="gate-arrow">→</span>
            </div>
            <div class="gate" onclick="location.href='word-history-list.html'">

                <p class="gate-sub">中西历史对照中的语言演变</p>
                <span class="gate-arrow">→</span>
            </div>
            <div class="gate">
                <h2 class="gate-title">以词溯源</h2>
                <p class="gate-sub">单词在中文语境中的回声</p>
                <span class="gate-arrow">→</span>
            </div>
        </section>

        <!-- 底部：隐含时间轴 -->
        <section class="timeline-hint">
            <div class="timeline-line">
                <span class="tl-mark" data-era="先秦·希腊">·</span>
