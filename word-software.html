<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分类单词本</title>
<style>
:root {
  --primary: #10b981;
  --primary-dark: #059669;
  --primary-light: #d1fae5;
  --secondary: #3b82f6;
  --secondary-dark: #2563eb;
  --danger: #ef4444;
  --danger-dark: #dc2626;
  --warning: #f59e0b;
  --warning-dark: #d97706;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #1e293b;
  --text-secondary: #64748b;
  --border: #e2e8f0;
  --radius: 12px;
  --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  max-width: 680px;
  margin: 0 auto;
  padding: 24px 16px;
  min-height: 100vh;
}

/* 顶部标题 */
header {
  text-align: center;
  margin-bottom: 28px;
  animation: fadeInDown 0.5s ease;
}
header h1 {
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
}
header p {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-top: 4px;
}

/* 卡片容器 */
section {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  animation: fadeInUp 0.4s ease both;
  transition: transform 0.2s, box-shadow 0.2s;
}
section:hover {
  box-shadow: var(--shadow-md);
}

section h2 {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text);
}

/* 表单元素 */
input, select, button {
  font-family: inherit;
  font-size: 0.95rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  outline: none;
  transition: all 0.2s;
}

input, select {
  padding: 10px 12px;
  background: #fff;
  color: var(--text);
  width: 100%;
}
input:focus, select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}

button {
  padding: 10px 16px;
  background: var(--primary);
  color: white;
  border: none;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  white-space: nowrap;
}
button:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
button:active {
  transform: translateY(0) scale(0.98);
}

/* 按钮变体 */
.btn-danger {
  background: var(--danger);
}
.btn-danger:hover {
  background: var(--danger-dark);
}
.btn-secondary {
  background: var(--secondary);
}
.btn-secondary:hover {
  background: var(--secondary-dark);
}
.btn-warning {
  background: var(--warning);
}
.btn-warning:hover {
  background: var(--warning-dark);
}
.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-ghost:hover {
  background: var(--bg);
  color: var(--text);
}

/* 内联布局 */
.inline {
  display: flex;
  gap: 10px;
  align-items: stretch;
  flex-wrap: wrap;
}
.inline > * {
  flex: 1 1 120px;
}
.inline button {
  flex: 0 0 auto;
}

/* 消息提示 */
.msg {
  margin-top: 10px;
  font-size: 0.9rem;
  min-height: 1.4em;
}
.green { color: var(--primary-dark); font-weight: 500; }
.red { color: var(--danger); font-weight: 500; }

/* 类别列表 */
#catList {
  list-style: none;
  margin-top: 10px;
}
#catList li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  background: var(--bg);
  border-radius: 8px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
  transition: all 0.2s;
}
#catList li:hover {
  border-color: var(--primary);
  transform: translateX(2px);
}
#catList li span:first-child {
  font-weight: 600;
  font-size: 0.95rem;
}
#catList li small {
  color: var(--text-secondary);
  font-weight: 400;
  margin-left: 6px;
}
.cat-del {
  padding: 4px 10px;
  font-size: 0.75rem;
  border-radius: 6px;
}

/* 单词列表 */
.word-list-wrap {
  max-height: 320px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-top: 10px;
  background: var(--card);
}
.word-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.word-item:last-child { border-bottom: none; }
.word-item:hover { background: #f8fafc; }
.word-item strong {
  color: var(--primary-dark);
  font-weight: 600;
  font-size: 0.95rem;
}
.word-item span {
  color: var(--text-secondary);
  font-size: 0.9rem;
}
.word-del {
  padding: 4px 10px;
  font-size: 0.75rem;
  border-radius: 6px;
}

/* 空状态 */
.empty-state {
  text-align: center;
  padding: 24px;
  color: var(--text-secondary);
  font-size: 0.9rem;
}
.empty-state-icon {
  font-size: 2rem;
  margin-bottom: 8px;
  opacity: 0.5;
}

/* 复习面板 */
.review-panel {
  display: none;
  animation: fadeIn 0.3s ease;
}
.review-panel.active {
  display: block;
}
.main-panel.hidden {
  display: none;
}

#progress {
  text-align: center;
  color: var(--text-secondary);
  font-size: 0.85rem;
  margin-bottom: 20px;
  letter-spacing: 0.5px;
}

#chineseDisplay {
  font-size: 2.4rem;
  font-weight: 700;
  text-align: center;
  color: var(--text);
  margin: 40px 0 30px;
  letter-spacing: 1px;
}

#answerInput {
  font-size: 1.2rem;
  padding: 14px;
  text-align: center;
  letter-spacing: 0.5px;
  border-width: 2px;
}
#answerInput:focus {
  border-color: var(--primary);
}

#answerFeedback {
  text-align: center;
  font-size: 1.1rem;
  font-weight: 600;
  margin: 16px 0;
  min-height: 2rem;
}

#nextBtn {
  display: block;
  margin: 0 auto;
  padding: 10px 32px;
}

.group-result {
  background: linear-gradient(135deg, #eff6ff 0%, #eef2ff 100%);
  border: 1px solid #dbeafe;
  padding: 24px;
  border-radius: var(--radius);
  text-align: center;
  animation: fadeInUp 0.4s ease;
}
.group-result #groupStats {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
}
.wrong-list {
  background: #fef2f2;
  border: 1px solid #fee2e2;
  padding: 12px 16px;
  border-radius: 8px;
  margin: 12px 0;
  text-align: left;
}
.wrong-list strong {
  color: var(--danger-dark);
  font-size: 0.9rem;
}
.wrong-list ul {
  margin-top: 6px;
  padding-left: 18px;
}
.wrong-list li {
  margin: 4px 0;
  color: var(--text-secondary);
  font-size: 0.9rem;
}

/* 数据管理按钮组 */
.data-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.data-actions button,
.data-actions label {
  flex: 1 1 140px;
  text-align: center;
  justify-content: center;
}

/* 复习面板底部返回 */
.review-footer {
  margin-top: 30px;
  text-align: center;
}

/* 动画 */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 滚动条美化 */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

/* 响应式 */
@media (max-width: 500px) {
  body { padding: 16px 12px; }
  header h1 { font-size: 1.5rem; }
  #chineseDisplay { font-size: 2rem; }
  .inline { flex-direction: column; }
  .inline > * { width: 100%; flex: none; }
  .inline button { width: 100%; }
  section { padding: 16px; }
}
</style>
</head>
<body>

<header>
  <h1>📚 分类单词本</h1>
  <p>收录 · 分类 · 拼写复习</p>
</header>

<!-- ==================== 主面板 ==================== -->
<div id="mainPanel" class="main-panel">

  <!-- 类别管理 -->
  <section>
    <h2>📂 类别管理</h2>
    <div class="inline">
      <input id="newCat" placeholder="输入新类别名称，按回车创建" onkeydown="if(event.key==='Enter') createCategory()">
      <button onclick="createCategory()">➕ 创建类别</button>
    </div>
    <ul id="catList"></ul>
  </section>

  <!-- 添加单词 -->
  <section>
    <h2>📝 添加单词</h2>
    <div class="inline">
      <select id="addCatSelect"><option value="">-- 选择类别 --</option></select>
      <input id="addEn" placeholder="英文单词" onkeydown="if(event.key==='Enter') {event.preventDefault(); document.getElementById('addZh').focus();}">
      <input id="addZh" placeholder="中文释义" onkeydown="if(event.key==='Enter') addWord()">
      <button onclick="addWord()">➕ 添加</button>
    </div>
    <p id="addMsg" class="msg"></p>
  </section>

  <!-- 单词列表与删除 -->
  <section>
    <h2>📖 单词列表</h2>
    <div class="inline">
      <select id="wordListCatSelect" onchange="refreshWordList()"><option value="">-- 选择类别 --</option></select>
      <button class="btn-secondary" onclick="document.getElementById('wordListCatSelect').value? refreshWordList(): alert('请先选择类别')">📋 显示单词</button>
    </div>
    <div id="wordListContainer"></div>
  </section>

  <!-- 复习入口 -->
  <section>
    <h2>🔁 复习拼写</h2>
    <div class="inline">
      <select id="reviewCatSelect"><option value="">-- 选择类别 --</option></select>
      <button class="btn-secondary" onclick="startReview()">▶ 开始复习</button>
    </div>
    <p id="reviewInfo" class="msg"></p>
  </section>

  <!-- 数据管理 -->
  <section>
    <h2>💾 数据管理</h2>
    <div class="data-actions">
      <button onclick="exportData()">⬇️ 导出 JSON</button>
      <label class="btn-secondary" style="display:inline-flex; cursor:pointer;">📂 导入 JSON
        <input type="file" id="importFileInput" accept=".json,application/json" style="display:none;" onchange="importData(event)">
      </label>
      <button class="btn-warning" onclick="clearAllData()">🗑️ 清空所有</button>
    </div>
    <p id="dataMsg" class="msg"></p>
  </section>
</div>

<!-- ==================== 复习面板 ==================== -->
<div id="reviewPanel" class="review-panel">
  <p id="progress"></p>

  <div id="quizArea">
    <p id="chineseDisplay"></p>
    <div class="inline">
      <input id="answerInput" placeholder="输入英文拼写，按回车提交" onkeydown="if(event.key==='Enter') submitAnswer()" autocomplete="off">
      <button id="submitBtn" onclick="submitAnswer()">✅ 提交</button>
    </div>
    <div id="answerFeedback"></div>
    <button id="nextBtn" class="btn-secondary" style="display:none;" onclick="nextWord()">▶ 下一词</button>
  </div>

  <div id="groupResult" style="display:none;">
    <div class="group-result">
      <p id="groupStats"></p>
      <div id="wrongListContainer"></div>
      <div style="display:flex; gap:10px; margin-top:16px; justify-content:center;">
        <button class="btn-secondary" id="continueBtn" onclick="continueReview()">🔄 继续复习</button>
        <button class="btn-danger" onclick="exitReview()">🚪 退出</button>
      </div>
    </div>
  </div>

  <div class="review-footer">
    <button class="btn-ghost" onclick="exitReview()">← 返回主面板</button>
  </div>
</div>

<script>
// ============================================================
//  数据层（完全不变）
// ============================================================
const STORAGE_KEY = 'vocab_categorized_v2';
let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ============================================================
//  工具函数
// ============================================================
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getCatKeys() { return Object.keys(data); }

function esc(str) { return str.replace(/'/g, "\\'"); }

// ============================================================
//  类别管理
// ============================================================
function createCategory() {
  const input = document.getElementById('newCat');
  const name = input.value.trim();
  if (!name) { alert('请输入类别名称'); return; }
  const existing = getCatKeys().find(k => k.toLowerCase() === name.toLowerCase());
  if (existing) { alert(`类别 "${existing}" 已存在`); input.value = ''; return; }
  data[name] = {};
  saveData();
  input.value = '';
  refreshUI();
  ['addCatSelect', 'wordListCatSelect', 'reviewCatSelect'].forEach(id => {
    const sel = document.getElementById(id);
    if (sel) sel.value = name;
  });
  refreshWordList();
}

function deleteCategory(cat) {
  if (!data[cat]) return;
  if (!confirm(`确定要删除类别「${cat}」及其所有单词吗？`)) return;
  delete data[cat];
  saveData();
  refreshUI();
  document.getElementById('wordListContainer').innerHTML = '';
  showDataMsg('已删除类别');
}

// ============================================================
//  单词管理
// ============================================================
function addWord() {
  const cat = document.getElementById('addCatSelect').value;
  if (!cat) { document.getElementById('addMsg').textContent = '请先选择类别'; return; }
  const en = document.getElementById('addEn').value.trim().toLowerCase();
  const zh = document.getElementById('addZh').value.trim();
  if (!en || !zh) { document.getElementById('addMsg').textContent = '请输入英文和中文'; return; }
  if (data[cat][en]) {
    document.getElementById('addMsg').textContent = `单词 "${en}" 已存在于「${cat}」，已忽略。`;
  } else {
    data[cat][en] = zh;
    saveData();
    document.getElementById('addMsg').textContent = `✅ 已添加 [${cat}] ${en}: ${zh}`;
  }
  document.getElementById('addEn').value = '';
  document.getElementById('addZh').value = '';
  refreshCatList();
  refreshWordList();
}

function deleteWord(cat, en) {
  if (!data[cat] || !data[cat][en]) return;
  if (!confirm(`确定删除单词 "${en}" (${data[cat][en]})？`)) return;
  delete data[cat][en];
  saveData();
  refreshCatList();
  refreshWordList();
  showDataMsg(`已删除 "${en}"`);
}

function refreshWordList() {
  const cat = document.getElementById('wordListCatSelect').value;
  const container = document.getElementById('wordListContainer');
  if (!cat || !data[cat]) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📂</div>请选择一个有效类别</div>';
    return;
  }
  const entries = Object.entries(data[cat]);
  if (entries.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div>该类别下暂无单词，快去添加吧</div>';
    return;
  }
  let html = '<div class="word-list-wrap">';
  entries.forEach(([en, zh]) => {
    const safeCat = esc(cat);
    const safeEn = esc(en);
    html += `<div class="word-item">
      <div><strong>${en}</strong> <span>— ${zh}</span></div>
      <button class="word-del btn-danger" onclick="deleteWord('${safeCat}','${safeEn}')">删除</button>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

// ============================================================
//  导出 / 导入 / 清空
// ============================================================
function exportData() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `vocab_backup_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showDataMsg('✅ 导出成功');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (imported === null) throw new Error('格式错误（null）');
      if (typeof imported !== 'object' || Array.isArray(imported)) throw new Error('格式错误');
      for (const cat of Object.keys(imported)) {
        if (typeof imported[cat] !== 'object' || Array.isArray(imported[cat])) throw new Error('类别格式错误');
        for (const en of Object.keys(imported[cat])) {
          if (typeof imported[cat][en] !== 'string') throw new Error('单词格式错误');
        }
      }
      if (!confirm(`导入将覆盖当前所有数据（当前 ${getCatKeys().length} 个类别，导入 ${Object.keys(imported).length} 个类别）。确定继续？`)) return;
      data = imported;
      saveData();
      refreshUI();
      refreshWordList();
      showDataMsg('✅ 导入成功');
    } catch (err) {
      alert('导入失败：文件格式不正确。' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function clearAllData() {
  if (!confirm('确定要清空所有类别和单词吗？此操作不可撤销！')) return;
  data = {};
  saveData();
  refreshUI();
  refreshWordList();
  showDataMsg('🗑️ 已清空所有数据');
}

function showDataMsg(msg) {
  document.getElementById('dataMsg').textContent = msg;
  setTimeout(() => { document.getElementById('dataMsg').textContent = ''; }, 3000);
}

// ============================================================
//  UI刷新
// ============================================================
function refreshCatList() {
  const list = document.getElementById('catList');
  const keys = getCatKeys();
  if (keys.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div>暂无类别，请创建一个</div>';
    return;
  }
  list.innerHTML = keys.map(cat => {
    const count = Object.keys(data[cat]).length;
    const safeCat = esc(cat);
    return `<li>
      <span>${cat} <small>(${count} 词)</small></span>
      <button class="cat-del btn-danger" onclick="deleteCategory('${safeCat}')">删除</button>
    </li>`;
  }).join('');
}

function refreshSelects() {
  const ids = ['addCatSelect', 'wordListCatSelect', 'reviewCatSelect'];
  const saved = ids.map(id => document.getElementById(id).value);
  ids.forEach((id, i) => {
    const sel = document.getElementById(id);
    sel.innerHTML = '<option value="">-- 选择类别 --</option>';
    getCatKeys().forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat;
      opt.textContent = cat;
      sel.appendChild(opt);
    });
    if (saved[i] && data[saved[i]]) sel.value = saved[i];
  });
}

function refreshUI() {
  refreshCatList();
  refreshSelects();
}

// ============================================================
//  复习核心
// ============================================================
let review = null;
let autoNextTimer = null;

function startReview() {
  const cat = document.getElementById('reviewCatSelect').value;
  if (!cat) { document.getElementById('reviewInfo').textContent = '请先选择类别'; return; }
  const entries = Object.entries(data[cat]);
  if (entries.length === 0) { document.getElementById('reviewInfo').textContent = `「${cat}」中没有单词`; return; }

  const allWords = shuffleArray(entries.map(([en, zh]) => ({ en, zh })));

  review = {
    cat,
    allWords,
    offset: 0,
    group: [],
    groupIdx: 0,
    correct: 0,
    totalInGroup: 0,
    finished: false,
    round: 1,
    submitted: false
  };

  document.getElementById('mainPanel').classList.add('hidden');
  document.getElementById('reviewPanel').classList.add('active');
  document.getElementById('reviewInfo').textContent = '';
  document.getElementById('groupResult').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';

  loadNextGroup();
}

function loadNextGroup() {
  if (!review) return;

  if (review.offset >= review.allWords.length) {
    review.allWords = shuffleArray(review.allWords);
    review.offset = 0;
    review.round++;
  }

  const remaining = review.allWords.length - review.offset;
  const groupSize = Math.min(20, remaining);
  review.group = review.allWords.slice(review.offset, review.offset + groupSize);
  review.offset += groupSize;
  review.groupIdx = 0;
  review.correct = 0;
  review.totalInGroup = groupSize;
  review.finished = false;

  document.getElementById('groupResult').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('answerInput').disabled = false;
  document.getElementById('answerInput').value = '';
  document.getElementById('answerFeedback').textContent = '';
  document.getElementById('answerInput').focus();
  clearTimer();

  showWord();
}

function showWord() {
  if (!review || review.finished) return;
  review.submitted = false;
  const word = review.group[review.groupIdx];
  if (!word) { finishGroup(); return; }

  const totalWords = review.allWords.length;
  const reviewedSoFar = review.offset - review.totalInGroup + review.groupIdx;
  document.getElementById('chineseDisplay').textContent = word.zh;
  document.getElementById('progress').textContent =
    `📂 ${review.cat}  ·  第 ${review.round} 轮  ·  第 ${Math.floor((review.offset - review.totalInGroup) / 20) + 1} 组  ·  ${review.groupIdx+1} / ${review.totalInGroup}  ·  已复习 ${reviewedSoFar} / ${totalWords}`;

  document.getElementById('answerInput').value = '';
  document.getElementById('answerFeedback').textContent = '';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('answerInput').disabled = false;
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('answerInput').focus();
  clearTimer();
}

function submitAnswer() {
  if (!review || review.submitted) return;
  const ans = document.getElementById('answerInput').value.trim().toLowerCase();
  const word = review.group[review.groupIdx];
  const feedback = document.getElementById('answerFeedback');
  const isCorrect = (ans === word.en);

  if (isCorrect) {
    feedback.innerHTML = '<span class="green">✅ 正确！</span>';
    review.correct++;
    word.wrong = false;
  } else {
    feedback.innerHTML = `<span class="red">❌ 错误，正确答案：${word.en}</span>`;
    word.wrong = true;
  }

  document.getElementById('submitBtn').disabled = true;
  document.getElementById('answerInput').disabled = true;
  review.submitted = true;

  const nextBtn = document.getElementById('nextBtn');
  const isLast = (review.groupIdx + 1 >= review.totalInGroup);
  nextBtn.textContent = isLast ? '📊 查看组结果' : '▶ 下一词';
  nextBtn.style.display = 'inline-block';

  const delay = isCorrect ? 500 : 1500;
  clearTimer();
  autoNextTimer = setTimeout(() => {
    autoNextTimer = null;
    nextWord();
  }, delay);
}

function nextWord() {
  clearTimer();
  if (!review || review.finished) return;
  review.groupIdx++;
  if (review.groupIdx >= review.totalInGroup) {
    finishGroup();
  } else {
    showWord();
  }
}

function finishGroup() {
  if (!review) return;
  review.finished = true;
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('groupResult').style.display = 'block';

  const total = review.totalInGroup;
  const correct = review.correct;
  const wrongCount = total - correct;
  let wrongHtml = '';
  if (wrongCount > 0) {
    const wrongWords = review.group.filter(w => w.wrong);
    wrongHtml = `<div class="wrong-list"><strong>❌ 错误单词 (${wrongWords.length})：</strong><ul>` +
      wrongWords.map(w => `<li>${w.en} — ${w.zh}</li>`).join('') + '</ul></div>';
  } else {
    wrongHtml = '<p style="color:var(--primary-dark); font-weight:600;">🎉 全部正确！</p>';
  }
  document.getElementById('wrongListContainer').innerHTML = wrongHtml;
  document.getElementById('groupStats').innerHTML =
    `📊 本组完成：正确 ${correct} / ${total} 词  (轮次: ${review.round})`;

  const remaining = review.allWords.length - review.offset;
  const continueBtn = document.getElementById('continueBtn');
  if (remaining > 0) {
    continueBtn.textContent = '🔄 继续下一组';
  } else {
    continueBtn.textContent = '🔄 开始新一轮';
  }

  clearTimer();
}

function continueReview() {
  if (!review) return;
  review.finished = false;
  document.getElementById('groupResult').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  loadNextGroup();
}

function exitReview() {
  clearTimer();
  review = null;
  document.getElementById('reviewPanel').classList.remove('active');
  document.getElementById('mainPanel').classList.remove('hidden');
  refreshUI();
  refreshWordList();
}

function clearTimer() {
  if (autoNextTimer) {
    clearTimeout(autoNextTimer);
    autoNextTimer = null;
  }
}

// ============================================================
//  初始化
// ============================================================
refreshUI();
refreshWordList();

window.addEventListener('load', () => {
  const keys = getCatKeys();
  if (keys.length > 0) {
    ['addCatSelect', 'wordListCatSelect', 'reviewCatSelect'].forEach(id => {
      document.getElementById(id).value = keys[0];
    });
    refreshWordList();
  }
});
</script>
</body>
</html>
