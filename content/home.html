<script>
  // 等待页面DOM完全加载后再执行（修复加载时机）
  document.addEventListener('DOMContentLoaded', function() {
    // 1. 动态设置“继续阅读”按钮
    const lastRoute = localStorage.getItem('last-chapter');
    const btn = document.getElementById('continue-reading-btn');
    if (lastRoute && btn) {
      btn.href = '#' + lastRoute;
      btn.style.display = 'block';
    }

    // 2. 动态加载 Giscus（修复版）
    if (document.querySelector('.giscus iframe')) return;

    const giscusScript = document.createElement('script');
    giscusScript.src = 'https://giscus.app/client.js';
    giscusScript.setAttribute('data-repo', 'zhiqiluo15/zhiqiluo15.github.io');
    giscusScript.setAttribute('data-repo-id', 'R_kgDORlI47Q');
    giscusScript.setAttribute('data-category', 'General');
    giscusScript.setAttribute('data-category-id', 'DIC_kwDORlI47c4C7uCH');
    giscusScript.setAttribute('data-mapping', 'pathname');
    giscusScript.setAttribute('data-strict', '0');
    giscusScript.setAttribute('data-reactions-enabled', '1');
    giscusScript.setAttribute('data-emit-metadata', '0');
    giscusScript.setAttribute('data-input-position', 'top');
    giscusScript.setAttribute('data-theme', 'preferred_color_scheme');
    giscusScript.setAttribute('data-lang', 'zh-CN');
    giscusScript.setAttribute('crossorigin', 'anonymous');
    giscusScript.async = true;

    const container = document.querySelector('#comments-section .giscus');
    if (container) {
      container.appendChild(giscusScript);
    }
  });
</script>
