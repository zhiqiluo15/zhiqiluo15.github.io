<div class="content-section" style="max-width:800px; margin:0 auto;">

  <!-- 最新章节入口 -->
  <div id="latest-chapter" style="margin-bottom:1.5rem;"></div>

  <!-- 继续阅读 -->
  <div id="continue-reading" style="text-align:center; margin-bottom:2rem;"></div>

  <!-- 标题 -->
  <h2 style="font-size:1.5rem; color:#b8c7ff; margin-bottom:0.5rem;">💬 讨论区</h2>
  <p style="color:#8892b0; margin-bottom:1.5rem; font-size:0.95rem;">欢迎对《灵弦华夏》的剧情和世界观留言讨论。</p>

  <!-- Giscus 评论区 -->
  <script src="https://giscus.app/client.js"
    data-repo="zhiqiluo15/zhiqiluo15.github.io"
    data-repo-id="R_kgDORlI47Q"
    data-category="Announcements"
    data-category-id="DIC_kwDORlI47c4C7uCG"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="bottom"
    data-theme="preferred_color_scheme"
    data-lang="zh-CN"
    crossorigin="anonymous"
    async>
  </script>

  <p style="text-align:center; color:#4a5568; font-size:0.75rem; margin-top:1.5rem;">
    评论由 GitHub Discussions 驱动 · 登录 GitHub 即可发言
  </p>
</div>

<script>
(async function() {
  // 加载最新章节链接
  try {
    const resp = await fetch('content/chapters-index.json');
    if (resp.ok) {
      const chapters = await resp.json();
      const latest = chapters[chapters.length - 1];
      if (latest) {
        document.getElementById('latest-chapter').innerHTML = `
          <div class="card" style="text-align:center; border-color: rgba(0,212,255,0.3);">
            <p style="margin:0; color:#8892b0; font-size:0.85rem;">📢 最新</p>
            <a href="#${latest.route}" style="font-size:1.1rem; color:#00d4ff;">${latest.title}</a>
          </div>`;
      }
    }
  } catch(e) {}

  // 继续阅读按钮
  const lastChapter = localStorage.getItem('last-chapter');
  if (lastChapter) {
    document.getElementById('continue-reading').innerHTML = `
      <a href="#${lastChapter}" 
         style="display:inline-block; padding:0.4rem 1.2rem; background:rgba(255,0,255,0.08); border:1px solid rgba(255,0,255,0.4); border-radius:20px; color:#ff00ff; text-decoration:none; font-size:0.9rem;">
        📖 继续阅读
      </a>`;
  }
})();
</script>
