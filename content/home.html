      </a>
      <a id="continue-reading-btn" style="display:none; width:auto; border-radius:8px; padding:0.8rem 1.5rem; text-decoration:none; font-size:1.2rem; background:rgba(0,212,255,0.15); color:#00d4ff; border:1px solid #00d4ff;" href="#">

<script>
  // 动态设置“继续阅读”按钮（直接执行，不需要 DOMContentLoaded）
  (function() {
    const lastRoute = localStorage.getItem('last-chapter');
    const btn = document.getElementById('continue-reading-btn');
    if (lastRoute && btn) {
      btn.href = '#' + lastRoute;
      btn.style.display = 'block';
    }
  })();
</script>
