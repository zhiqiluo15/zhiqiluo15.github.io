<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创作素材整理台</title>
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/stars.css">
    <link rel="stylesheet" href="assets/css/page-zhengli.css">
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <h1>创作素材整理台</h1>
        
        <div class="stats-bar">
            <div class="stat-item"><span class="stat-value" id="stat-total">0</span><span class="stat-label">总素材</span></div>
            <div class="stat-item"><span class="stat-value" id="stat-character">0</span><span class="stat-label">人物档案</span></div>
            <div class="stat-item"><span class="stat-value" id="stat-scene">0</span><span class="stat-label">地域场景</span></div>
            <div class="stat-item"><span class="stat-value" id="stat-foreshadow">0</span><span class="stat-label">伏笔线索</span></div>
            <div class="stat-item"><span class="stat-value" id="stat-idea">0</span><span class="stat-label">剧情点子</span></div>
        </div>

        <div class="input-section">
            <textarea id="material-input" placeholder="输入碎片素材（长短不限，零乱无妨，原样收录）..."></textarea>
            <div class="input-actions">
                <select id="category-select">
                    <option value="人物">人物档案</option>
                    <option value="场景">地域场景</option>
                    <option value="伏笔">伏笔线索</option>
                    <option value="点子">零散剧情点子</option>
                </select>
                <input type="text" id="feature-tags" placeholder="功能标签（可选）">
                <button class="btn btn-primary" onclick="addMaterial()">添加素材</button>
                <button class="btn btn-secondary" onclick="clearAllData()" style="margin-left: auto;">清空所有</button>
            </div>
        </div>

        <div class="input-section" style="background: rgba(79,172,254,0.08); border-color: rgba(79,172,254,0.3);">
            <h3 style="color: #4facfe; margin-bottom: 15px; font-size: 1.1em;">📥 批量导入（自动识别标签）</h3>
            <p style="color: #888; font-size: 13px; margin-bottom: 10px;">格式示例：【人物】空颜子，东胜神州送经客 [核心人物，佛骨道心]</p>
            <textarea id="batch-input" placeholder="粘贴带有【人物】【场景】【伏笔】【点子】标签的文本，系统会自动识别并分类导入...&#10;&#10;示例：&#10;【人物】孙悟空，花果山大王 [齐天大圣]&#10;【场景】水帘洞，洞天福地 [空颜子筑府处]&#10;【伏笔】送经客三字，空颜子不曾写过 [未解之谜]&#10;【点子】空颜子与猴子对话 [剧情桥段]"></textarea>
            <button class="btn btn-primary" onclick="batchImport()">开始批量导入</button>
            <span id="batch-result" style="margin-left: 15px; color: #888; font-size: 14px;"></span>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="showTab('all')">全部素材<span id="count-all">0</span></div>
            <div class="tab" onclick="showTab('character')">人物档案<span id="count-character">0</span></div>
            <div class="tab" onclick="showTab('scene')">地域场景<span id="count-scene">0</span></div>
            <div class="tab" onclick="showTab('foreshadow')">伏笔线索<span id="count-foreshadow">0</span></div>
            <div class="tab" onclick="showTab('idea')">剧情点子<span id="count-idea">0</span></div>
            <div class="tab" onclick="showTab('duplicate')">待筛选重复<span id="count-duplicate">0</span></div>
            <div class="tab" onclick="showTab('correction')">纠错提醒<span id="count-correction">0</span></div>
        </div>

        <div class="content-area active" id="tab-all">
            <div class="filter-tags">
                <div class="filter-tag all active" onclick="filterByCategory('')">全部</div>
                <div class="filter-tag 人物" onclick="filterByCategory('人物')">人物</div>
                <div class="filter-tag 场景" onclick="filterByCategory('场景')">场景</div>
                <div class="filter-tag 伏笔" onclick="filterByCategory('伏笔')">伏笔</div>
                <div class="filter-tag 点子" onclick="filterByCategory('点子')">点子</div>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索素材..." onkeyup="searchMaterial()">
                <button class="btn btn-secondary btn-small" onclick="exportData()">导出数据</button>
            </div>
            <div id="all-materials"></div>
        </div>

        <div class="content-area" id="tab-character"><div class="category-section"><h3>【人物档案】</h3><div id="character-materials"></div></div></div>
        <div class="content-area" id="tab-scene"><div class="category-section"><h3>【地域场景】</h3><div id="scene-materials"></div></div></div>
        <div class="content-area" id="tab-foreshadow"><div class="category-section"><h3>【伏笔线索】</h3><div id="foreshadow-materials"></div></div></div>
        <div class="content-area" id="tab-idea"><div class="category-section"><h3>【零散剧情点子】</h3><div id="idea-materials"></div></div></div>
        <div class="content-area" id="tab-duplicate"><div id="duplicate-content"></div></div>
        <div class="content-area" id="tab-correction"><div id="correction-content"></div></div>

        <div class="modal-overlay" id="edit-modal">
            <div class="modal">
                <h3>编辑素材</h3>
                <input type="hidden" id="edit-id">
                <select id="edit-category">
                    <option value="人物">人物档案</option>
                    <option value="场景">地域场景</option>
                    <option value="伏笔">伏笔线索</option>
                    <option value="点子">零散剧情点子</option>
                </select>
                <textarea id="edit-content" placeholder="素材内容"></textarea>
                <input type="text" id="edit-feature-tags" placeholder="功能标签（可选）">
                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button class="btn btn-primary" onclick="saveEdit()">保存</button>
                </div>
            </div>
        </div>
    </div>

<script src="assets/js/common.js" defer></script>
<script src="assets/js/zhengli.js"></script>
</body>
</html>
