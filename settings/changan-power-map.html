<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天宝十二载·长安城坊里权力地图 - 设定档案 - 灵弦华夏</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'Noto Serif SC', serif;
      color: #e8e4d9;
      background: linear-gradient(135deg, #0a0a12 0%, #12121a 30%, #0d0d15 70%, #0a0a12 100%);
      position: relative;
    }
    .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; background: #fff; border-radius: 50%;
      animation: twinkle var(--duration) ease-in-out infinite;
      box-shadow: 0 0 6px 2px rgba(245,230,200,0.3);
    }
    @keyframes twinkle {
      0%,100% { opacity: var(--min-opacity); transform: scale(1); }
      50% { opacity: var(--max-opacity); transform: scale(1.2); }
    }
    /* 滚动外层容器 */
    .scroll-wrap {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      position: relative;
    }
    .header {
      position: relative; padding: 24px 32px; display: flex; justify-content: space-between;
      align-items: center; z-index: 10; border-bottom: 1px solid rgba(201,196,181,0.08);
    }
    .site-name {
      font-family: 'Ma Shan Zheng', cursive; font-size: 1.8rem; color: #f5e6c8;
      letter-spacing: 0.15em; text-shadow: 0 0 25px rgba(245,230,200,0.35);
    }
    .nav-back {
      font-size: 0.9rem; color: #c9c4b5; text-decoration: none; letter-spacing: 0.1em;
      padding: 9px 18px; border: 1px solid rgba(201,196,181,0.2); border-radius: 22px;
      background: linear-gradient(135deg, rgba(245,230,200,0.04), transparent);
      transition: all 0.3s ease;
    }
    .nav-back:hover { color: #f5e6c8; border-color: rgba(245,230,200,0.45); }
    .main-content { position: relative; z-index: 10; max-width: 900px; margin: 0 auto; padding: 40px 32px; }
    .setting-header { text-align: center; padding: 40px 0 50px; position: relative; margin-bottom: 40px; }
    .setting-header::after {
      content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 120px; height: 1px; background: linear-gradient(90deg, transparent, rgba(245,230,200,0.4), transparent);
    }
    .setting-icon {
      width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg,#2a3a4a,#1a2a38);
      border: 3px solid rgba(245,230,200,0.3); display: flex; align-items: center; justify-content: center;
      font-family: 'Ma Shan Zheng', cursive; font-size: 3.2rem; color: #f5e6c8;
      margin: 0 auto 24px; box-shadow: 0 8px 35px rgba(0,0,0,0.4), 0 0 40px rgba(245,230,200,0.08);
      position: relative;
    }
    .setting-icon::before {
      content: ''; position: absolute; inset: -3px; border-radius: 50%;
      background: linear-gradient(45deg, rgba(245,230,200,0.3), transparent, rgba(245,230,200,0.15)); opacity: 0.6;
    }
    .setting-name {
      font-family: 'Ma Shan Zheng', cursive; font-size: 2.4rem; color: #f5e6c8;
      letter-spacing: 0.15em; margin-bottom: 8px; text-shadow: 0 0 30px rgba(245,230,200,0.4);
    }
    .setting-category { font-size: 1rem; color: #9a9588; letter-spacing: 0.2em; margin-bottom: 16px; }
    .setting-tags { display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; }
    .tag {
      padding: 8px 20px; background: linear-gradient(135deg, rgba(245,230,200,0.06), rgba(245,230,200,0.02));
      border: 1px solid rgba(245,230,200,0.2); border-radius: 24px; font-size: 0.85rem;
      color: #d4cfc2; letter-spacing: 0.08em;
    }
    .section {
      background: linear-gradient(145deg, rgba(20,20,32,0.9), rgba(12,12,20,0.95));
      border: 1px solid rgba(201,196,181,0.08); border-radius: 16px; padding: 32px; margin-bottom: 24px;
      transition: all 0.3s ease;
    }
    .section:hover { border-color: rgba(245,230,200,0.18); box-shadow: 0 4px 30px rgba(0,0,0,0.3); }
    .article-content { line-height: 2; font-size: 0.95rem; color: #c8c4b8; }
    .article-content .article-intro {
      font-size: 1.05rem; color: #e8e4d9; font-style: italic; padding: 24px 28px;
      background: linear-gradient(135deg, rgba(245,230,200,0.06), rgba(245,230,200,0.02));
      border-left: 3px solid rgba(245,230,200,0.28); border-radius: 0 12px 12px 0; margin-bottom: 36px;
    }
    .article-content h3 {
      font-family: 'Ma Shan Zheng','Noto Serif SC', serif; font-size: 1.4rem; color: #f5e6c8;
      font-weight: 400; margin: 40px 0 18px; padding-bottom: 12px;
      border-bottom: 1px solid rgba(245,230,200,0.15); letter-spacing: 0.06em;
      text-shadow: 0 0 12px rgba(245,230,200,0.12);
    }
    .article-content h4 { font-family: 'Noto Serif SC', serif; font-size: 1.08rem; color: #d4cfc2; font-weight: 600; margin: 28px 0 14px; letter-spacing: 0.04em; }
    .article-content p { margin-bottom: 16px; text-indent: 2em; text-align: justify; }
    .article-content p.no-indent { text-indent: 0; }
    .article-content .poem {
      font-family: 'Ma Shan Zheng','Noto Serif SC', serif; font-size: 1.15rem; color: #f5e6c8;
      text-align: center; padding: 18px 24px; margin: 20px 0; background: rgba(245,230,200,0.04);
      border-radius: 10px; letter-spacing: 0.06em; text-indent: 0; line-height: 2;
    }
    .article-content .highlight-box {
      background: linear-gradient(135deg, rgba(245,230,200,0.08), rgba(245,230,200,0.02));
      border: 1px solid rgba(245,230,200,0.15); border-radius: 10px; padding: 18px 24px; margin: 22px 0;
      font-size: 0.93rem; line-height: 1.9;
    }
    .article-content .highlight-box strong { color: #f5e6c8; font-weight: 600; }
    .article-content .divider { text-align: center; color: rgba(245,230,200,0.3); margin: 36px 0; font-size: 0.8rem; letter-spacing: 0.3em; }
    .article-content .end-poem {
      font-family: 'Ma Shan Zheng','Noto Serif SC', serif; font-size: 1.1rem; color: #e8e4d9;
      text-align: center; padding: 32px 24px; margin: 40px 0 8px;
      background: linear-gradient(135deg, rgba(245,230,200,0.05), transparent);
      border-radius: 14px; letter-spacing: 0.04em; line-height: 2.2;
      border: 1px solid rgba(245,230,200,0.08); text-indent: 0;
    }
    .article-content .sub-section { margin-left: 18px; padding-left: 18px; border-left: 1px solid rgba(245,230,200,0.1); margin-bottom: 18px; }
    .article-content .sub-section h5 { font-family: 'Noto Serif SC', serif; font-size: 0.95rem; color: #c9c0a0; font-weight: 600; margin: 18px 0 10px; letter-spacing: 0.03em; }
    .article-content .sub-section p { text-indent: 2em; }
    .footer-note { text-align: center; padding: 48px 32px; color: #7a7568; font-size: 0.88rem; letter-spacing: 0.1em; }

    /* 纯净sticky 无float */
    .back-float {
      position: sticky;
      bottom: 40px;
      margin-left: auto;
      margin-right: 40px;
      width: fit-content;
      z-index: 1000;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, rgba(20,20,32,0.92), rgba(12,12,20,0.96));
      border: 1px solid rgba(245,230,200,0.25);
      border-radius: 40px;
      color: #f5e6c8;
      font-family: 'Noto Serif SC', serif;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(0,0,0,0.4), 0 0 20px rgba(245,230,200,0.06);
      transition: all 0.3s ease;
      text-decoration: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .back-float:hover {
      background: rgba(35,35,55,0.95);
      border-color: rgba(245,230,200,0.5);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 30px rgba(245,230,200,0.15);
      transform: translateY(-3px);
    }
    .back-float:active {
      transform: scale(0.97);
    }
    .back-float::before {
      content: '←';
      font-size: 1.2rem;
      line-height: 1;
    }
    @media (max-width: 768px) {
      .back-float {
        bottom: 24px;
        margin-right: 24px;
        padding: 10px 18px;
        font-size: 0.85rem;
      }
      .back-float::before { font-size: 1rem; }
    }
    @media (max-width: 480px) {
      .back-float {
        bottom: 16px;
        margin-right: 16px;
        padding: 8px 14px;
        font-size: 0.8rem;
      }
      .back-float::before { font-size: 0.9rem; }
    }
  </style>
</head>
